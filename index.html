        rel="stylesheet">

    <style>
        :root {
            --emerald-600: #1f7a63;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        .emerald-primary {
            background-color: var(--emerald-600);
        }

        .emerald-text {
            color: var(--emerald-600);
        }

        .sidebar-item-active {
            background-color: var(--emerald-600);
            color: white !important;
            box-shadow: 0 10px 25px -5px rgba(31, 122, 99, 0.3);
        }

        .card-radius {
            border-radius: 2.5rem;
        }

        .item-radius {
            border-radius: 1.5rem;
        }

        .pill-radius {
            border-radius: 9999px;
        }

        .shadow-soft {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.04);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        input,
        select {
            border-radius: 1.25rem !important;
            background-color: #f1f5f9 !important;
            border: 2px solid transparent !important;
            transition: all 0.2s ease !important;
            padding: 1rem 1.5rem !important;
            width: 100%;
            font-weight: 600;
        }

        input:focus,
        select:focus {
            background-color: white !important;
            border-color: var(--emerald-600) !important;
            outline: none;
            box-shadow: 0 0 0 4px rgba(31, 122, 99, 0.1);
        }

        button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        button:active {
            transform: scale(0.95);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--emerald-600);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .card-radius {
                border-radius: 1.5rem;
            }

            .sidebar-mobile-open {
                transform: translateX(0) !important;
            }

            .sidebar-transition {
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .mobile-overlay {
                background: rgba(15, 23, 42, 0.4);
                backdrop-filter: blur(4px);
            }

            .main-mobile-p {
                padding: 1.25rem;
            }
        }
    </style>
</head>

        function toggleSidebar() {

            if (state.isSidebarOpen) {

        async function init() {
            try {
                const { data, error } = await client.auth.getSession();

                if (error) {
                    console.error("Erro de autorização Supabase:", error.message);
                    state.user = null;
                    render();
                    return;
                }

                if (data.session) {
                    state.user = data.session.user;
                    const displayName = state.user.email ? state.user.email.split('@')[0] : 'Usuário';
                    const userDisplayNameEl = document.getElementById('user-display-name');
                    if (userDisplayNameEl) userDisplayNameEl.textContent = displayName;
                    await fetchData();
                } else {
                    state.user = null;
                }
            } catch (e) {
                console.error("Falha na inicialização:", e.message);
                state.user = null;
            }
            render();
        }

        async function fetchData() {
            state.loading = true;
            render();
            try {
                const { data: loans } = await client.from('emprestimos').select('*, clientes(nome)');
                const { data: clients } = await client.from('clientes').select('*').order('nome');
                state.loans = loans || [];
                state.clients = clients || [];

                // Fetch users if we are on settings screen
                if (state.currentScreen === 'settings') {
                    const { data: users, error: userError } = await client.rpc('get_users');
                    if (!userError) state.users = users || [];
                }
            } catch (e) {
                console.warn("Erro ao buscar dados:", e);
            }
            state.loading = true; // Still loading? No, should be false
            state.loading = false;
            render();
        }

        async function authAction(email, password) {
            state.loading = true;
            render();
            try {
                if (state.isAuthMode === 'login') {
                    const { data, error } = await client.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    state.user = data.user;
                    init();
                } else {
                    const { error } = await client.auth.signUp({ email, password });
                    if (error) throw error;
                    alert("Conta criada! Verifique seu e-mail ou faça login agora.");
                    state.isAuthMode = 'login';
                    render();
                }
            } catch (e) {
                alert(e.message || "Erro de conexão");
            }
            state.loading = false;
            render();
        }

        async function logout() {
            await client.auth.signOut();
            state.user = null;
            render();
        }

        async function saveClient(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = {
                nome: formData.get('nome'),
                cpf: formData.get('cpf'),
                telefone: formData.get('telefone'),
                endereco: formData.get('endereco'),
            };

            state.loading = true;
            render();
            try {
                const { error } = await client.from('clientes').insert([data]);
                if (error) throw error;

                state.currentScreen = 'clients';
                await fetchData();
            } catch (e) {

            }
            state.loading = false;
            render();
        }

        async function saveLoan(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = {
                cliente_id: formData.get('cliente_id'),
                valor_principal: parseFloat(formData.get('valor_principal')),
                taxa_juros_mensal: parseFloat(formData.get('taxa_juros_mensal')),
                data_emprestimo: formData.get('data_emprestimo'),
                data_vencimento: formData.get('data_vencimento'),
                total_pago: 0,
                status: 'Ativo'
            };

            state.loading = true;
            render();
            try {
                const { error } = await client.from('emprestimos').insert([data]);
                if (error) throw error;
                alert("Empréstimo registrado com sucesso!");
                state.currentScreen = 'loans';
                await fetchData();
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
            state.loading = false;
            render();
        }

        function calculateCurrentDebt(loan) {
            const today = new Date();
            const startDate = new Date(loan.data_emprestimo);
            const dueDate = new Date(loan.data_vencimento);

            const principal = loan.valor_principal || 0;
            const rateMensal = (loan.taxa_juros_mensal || 0) / 100;
            const dailyRate = rateMensal / 30;

            const contractDiffTime = Math.abs(dueDate - startDate);
            const contractDays = Math.ceil(contractDiffTime / (1000 * 60 * 60 * 24));
            const contractMonths = Math.floor(contractDays / 30) || 1;

            const montanteContrato = principal * Math.pow(1 + rateMensal, contractMonths);

            let montanteFinal = montanteContrato;
            let daysOverdue = 0;

            if (today > dueDate) {
                const overdueDiffTime = Math.abs(today - dueDate);
                daysOverdue = Math.floor(overdueDiffTime / (1000 * 60 * 60 * 24));
                montanteFinal = montanteContrato * Math.pow(1 + dailyRate, daysOverdue);
            }

            const totalDevedor = montanteFinal - (loan.total_pago || 0);

            return {
                days: contractDays + daysOverdue,
                jurosTotal: montanteFinal - principal,
                totalDebito: totalDevedor > 0 ? totalDevedor : 0,
                status: today > dueDate ? (totalDevedor <= 0 ? 'Quitado' : 'Vencido') : 'Aguardando'
            };
        }

        async function processPayment(loanId, currentTotal) {
            const amount = prompt("Digite o valor do pagamento/desconto (R$):");
            if (!amount || isNaN(amount)) return;

            const loan = state.loans.find(l => l.id === loanId);
            const newTotalPago = (loan.total_pago || 0) + parseFloat(amount);

            try {
                const { error } = await client.from('emprestimos').update({ total_pago: newTotalPago }).eq('id', loanId);
                if (error) throw error;
                await fetchData();
            } catch (e) { alert(e.message); }
        }

        async function confirmPayoff(loanId) {
            if (!confirm("Confirmar quitação total deste empréstimo?")) return;
            try {
                const { error } = await client.from('emprestimos').update({ status: 'Quitado' }).eq('id', loanId);
                if (error) throw error;
                await fetchData();
            } catch (e) { alert(e.message); }
        }

        async function deleteLoan(loanId) {
            if (!confirm("Tem certeza que deseja excluir permanentemente?")) return;
            try {
                const { error } = await client.from('emprestimos').delete().eq('id', loanId);
                if (error) throw error;
                await fetchData();
            } catch (e) { alert(e.message); }
        }

        async function registerUser(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const email = formData.get('email');
            const password = formData.get('password');

            state.loading = true;
            render();
            try {
                // In Supabase, signUp creates a user. 
                // For admin management, we usually use a service_role or specialized function.
                // We'll use the public signUp for simplicity or an RPC if configured.
                const { error } = await client.auth.signUp({ email, password });
                if (error) throw error;
                alert("Usuário pré-cadastrado! Ele precisará confirmar o e-mail ou você pode configurar o auto-confirm no Supabase.");
                event.target.reset();
                await fetchData();
            } catch (e) {
                alert("Erro ao cadastrar: " + e.message);
            }
            state.loading = false;
            render();
        }

        async function removeUser(userId) {
            if (!confirm("Remover este usuário permanentemente?")) return;
            state.loading = true;
            render();
            try {
                const { error } = await client.rpc('delete_user', { user_id: userId });
                if (error) throw error;
                alert("Usuário removido com sucesso!");
                await fetchData();
            } catch (e) {
                alert("Erro ao remover: " + e.message);
            }
            state.loading = false;
            render();
        }

        async function updatePassword(userId) {
            const newPassword = prompt("Digite a nova senha para este usuário:");
            if (!newPassword || newPassword.length < 6) {
                alert("Senha inválida (mínimo 6 caracteres).");
                return;
            }

            state.loading = true;
            render();
            try {
                // For admin password reset, we use an RPC or the user must be authenticated.
                // In a simple setup, we'll suggest an RPC if it's the admin doing it.
                const { error } = await client.rpc('admin_update_user_password', {
                    u_id: userId,
                    new_pass: newPassword
                });
                if (error) throw error;
                alert("Senha alterada com sucesso!");
            } catch (e) {
                alert("Erro ao alterar senha. Verifique se a função RPC está configurada no Supabase.");
            }
            state.loading = false;
            render();
        }

                            </button>
                        </form>
                        <button onclick="state.isAuthMode = '${isLogin ? 'signup' : 'login'}'; render();" class="mt-6 md:mt-8 text-emerald-600 font-black text-xs uppercase tracking-widest hover:underline">
                            ${isLogin ? 'Cadastrar novo acesso' : 'Voltar para o Login'}
                        </button>
                    </div>
                `;
                lucide.createIcons();

            lucide.createIcons();

        function renderLoans(container) {
            container.innerHTML = `

                        <button onclick="navigate('new-loan')" class="emerald-primary text-white px-6 md:px-10 py-3 md:py-5 pill-radius font-black shadow-xl shadow-emerald-100 hover:scale-105 text-sm md:text-base">+ Novo Empréstimo</button>

                        <div class="p-4 space-y-3">
                            ${state.loans.map(loan => {
                const calc = loan.status === 'Quitado' ? { days: 0, jurosTotal: 0, totalDebito: 0, status: 'Quitado' } : calculateCurrentDebt(loan);
                return `

                                    <div class="col-span-3 text-left">
                                        <p class="font-black text-lg text-slate-800 truncate">${loan.clientes?.nome || '---'}</p>
                                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Taxa: ${loan.taxa_juros_mensal}%</p>
                                    </div>
                                    <div class="col-span-1 font-bold text-slate-600">R$${(loan.valor_principal || 0).toLocaleString('pt-BR')}</div>
                                    <div class="col-span-1"><span class="bg-slate-100 px-3 py-1 rounded-lg text-slate-500 font-black text-xs">${calc.days}d</span></div>
                                    <div class="col-span-2 text-slate-500 font-bold text-sm">${new Date(loan.data_vencimento).toLocaleDateString('pt-BR')}</div>
                                    <div class="col-span-1 font-bold text-red-400">R$${calc.jurosTotal.toFixed(2)}</div>
                                    <div class="col-span-2 font-black text-emerald-700 text-lg">R$${calc.totalDebito.toFixed(2)}</div>
                                    <div class="col-span-1">
                                        <span class="px-3 py-1 pill-radius text-[8px] font-black uppercase tracking-widest ${calc.status === 'Vencido' ? 'bg-red-100 text-red-600' : (calc.status === 'Quitado' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500')}">
                                            ${calc.status}
                                        </span>
                                    </div>
                                    <div class="col-span-1 text-right flex justify-end gap-1">
                                        <button title="Quitar" onclick="confirmPayoff('${loan.id}')" class="p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-600 hover:text-white transition-all"><i data-lucide="check" class="w-3 h-3"></i></button>
                                        <button title="Baixa" onclick="processPayment('${loan.id}', ${calc.totalDebito})" class="p-2 bg-orange-50 text-orange-600 rounded-lg hover:bg-orange-600 hover:text-white transition-all"><i data-lucide="minus" class="w-3 h-3"></i></button>
                                        <button title="Excluir" onclick="deleteLoan('${loan.id}')" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-all"><i data-lucide="trash" class="w-3 h-3"></i></button>
                                    </div>
                                </div>`;
            }).join('')}
                        </div>
                    </div>

                    <!-- Mobile View Cards -->
                    <div class="md:hidden space-y-4">
                        ${state.loans.map(loan => {
                const calc = loan.status === 'Quitado' ? { days: 0, jurosTotal: 0, totalDebito: 0, status: 'Quitado' } : calculateCurrentDebt(loan);
                return `
                            <div class="bg-white p-6 card-radius shadow-sm border border-slate-100 space-y-4">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="font-black text-xl text-slate-800">${loan.clientes?.nome || '---'}</p>
                                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Vencimento: ${new Date(loan.data_vencimento).toLocaleDateString('pt-BR')}</p>
                                    </div>
                                    <span class="px-3 py-1 pill-radius text-[8px] font-black uppercase tracking-widest ${calc.status === 'Vencido' ? 'bg-red-100 text-red-600' : (calc.status === 'Quitado' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500')}">
                                        ${calc.status}
                                    </span>
                                </div>
                                <div class="grid grid-cols-2 gap-4 pt-2">
                                    <div class="bg-slate-50 p-3 rounded-2xl">
                                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest border-b border-slate-100 mb-2 pb-1">Principal</p>
                                        <p class="font-bold text-slate-700">R$${(loan.valor_principal || 0).toLocaleString('pt-BR')}</p>
                                    </div>
                                    <div class="bg-emerald-50 p-3 rounded-2xl">
                                        <p class="text-[9px] text-emerald-700/50 font-black uppercase tracking-widest border-b border-emerald-100 mb-2 pb-1">Total Devedor</p>
                                        <p class="font-black text-emerald-700">R$${calc.totalDebito.toFixed(2)}</p>
                                    </div>
                                </div>
                                <div class="flex gap-2 pt-2">
                                    <button onclick="confirmPayoff('${loan.id}')" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                                        <i data-lucide="check" class="w-3 h-3"></i> Quitar
                                    </button>
                                    <button onclick="processPayment('${loan.id}', ${calc.totalDebito})" class="flex-1 bg-orange-100 text-orange-600 py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                                        <i data-lucide="minus" class="w-3 h-3"></i> Baixa
                                    </button>
                                    <button onclick="deleteLoan('${loan.id}')" class="w-12 bg-red-50 text-red-500 py-3 rounded-xl font-bold text-xs flex items-center justify-center">
                                        <i data-lucide="trash" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>`;
            }).join('')}
                        ${state.loans.length === 0 ? '<p class="text-center py-10 text-slate-300 font-bold uppercase tracking-widest text-xs">Sem empréstimos...</p>' : ''}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderNewLoan(container) {
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = `
                <div class="animate-slide-up py-4 md:py-6 space-y-6 md:space-y-10 max-w-4xl mx-auto px-4 md:px-0">
                    <button onclick="navigate('loans')" class="flex items-center gap-3 text-slate-300 font-black uppercase text-[10px] tracking-widest hover:text-emerald-600 transition-colors">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar para Lista
                    </button>
                    
                    <div class="bg-white p-8 md:p-16 card-radius shadow-soft border border-slate-100">
                        <div class="mb-8 md:mb-12 border-l-8 border-emerald-600 pl-6 md:pl-8">
                            <h2 class="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">Cadastro de Empréstimo</h2>
                            <p class="text-slate-400 font-bold mt-1 uppercase tracking-[0.2em] text-[9px] md:text-[10px]">Juros e Status são automáticos.</p>
                        </div>
                        
                        <form onsubmit="saveLoan(event)" class="space-y-6 md:space-y-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                                <div class="col-span-1 md:col-span-2 space-y-2 md:space-y-3">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Selecionar Cliente</label>
                                    <select name="cliente_id" required class="w-full">
                                        <option value="" disabled selected>Escolha um cliente da lista</option>
                                        ${state.clients.map(c => `<option value="${c.id}">${c.nome}</option>`).join('')}
                                    </select>
                                </div>
                                
                                <div class="space-y-2 md:space-y-3">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Data do Empréstimo</label>
                                    <input id="data_emprestimo" name="data_emprestimo" type="date" value="${today}" required onchange="
                                        const d = new Date(this.value);
                                        d.setDate(d.getDate() + 30);
                                        document.getElementById('data_vencimento').value = d.toISOString().split('T')[0];
                                    ">
                                </div>
                                <div class="space-y-2 md:space-y-3">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Data de Vencimento</label>
                                    <input id="data_vencimento" name="data_vencimento" type="date" required>
                                </div>

                                <div class="space-y-2 md:space-y-3">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Valor do Empréstimo (R$)</label>
                                    <input name="valor_principal" type="number" step="0.01" placeholder="0,00" required>
                                </div>
                                <div class="space-y-2 md:space-y-3">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Taxa de Juros Mensal (%)</label>
                                    <input name="taxa_juros_mensal" type="number" step="0.1" placeholder="0,0" required>
                                </div>
                            </div>
                            
                            <div class="pt-6 md:pt-10 flex flex-col md:flex-row gap-4">
                                <button type="button" onclick="navigate('loans')" class="order-2 md:order-1 flex-1 bg-slate-100 text-slate-400 py-4 md:py-6 rounded-2xl md:rounded-3xl font-black text-lg md:text-xl hover:bg-slate-200 uppercase tracking-widest text-[11px]">
                                    Cancelar
                                </button>
                                <button type="submit" class="order-1 md:order-2 flex-[2] emerald-primary text-white py-4 md:py-6 rounded-2xl md:rounded-3xl font-black text-lg md:text-xl shadow-2xl shadow-emerald-100 flex items-center justify-center gap-4 hover:brightness-110 active:scale-95 transition-all">
                                    ${state.loading ? '<div class="loader"></div>' : '<i data-lucide="check-circle" class="w-6 h-6"></i> SALVAR'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderClients(container) {
            container.innerHTML = `
                <div class="animate-slide-up py-4 md:py-6 space-y-6 md:space-y-10 px-4 md:px-0">
                    <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div>
                            <h2 class="text-3xl md:text-5xl font-black text-slate-800 tracking-tight">Clientes</h2>
                            <p class="text-slate-400 font-bold mt-1 md:mt-2 uppercase tracking-widest text-[9px] md:text-[10px]">Gestão de Carteira</p>
                        </div>
                        <button onclick="navigate('new-client')" class="emerald-primary text-white px-6 md:px-10 py-3 md:py-5 pill-radius font-black shadow-xl shadow-emerald-100 hover:scale-105 text-sm md:text-base">+ Novo Cliente</button>
                    </div>
                    
                    <div class="space-y-3">
                        ${state.clients.map(c => `
                            <div class="bg-white p-5 md:p-8 card-radius shadow-sm md:shadow-soft border border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4 group hover:border-emerald-100 transition-all">
                                <div class="flex-1">
                                    <p class="font-black text-lg md:text-xl text-slate-800 tracking-tight">${c.nome}</p>
                                    <p class="text-[9px] md:text-[10px] font-black text-slate-300 mt-1 tracking-widest uppercase">${c.cpf || 'CPF não informado'}</p>
                                </div>
                                <div class="flex items-center gap-3 text-emerald-700 font-bold bg-emerald-50/50 p-3 md:p-0 md:bg-transparent rounded-xl">
                                    <div class="w-8 h-8 md:w-10 md:h-10 bg-emerald-100 md:bg-emerald-50 rounded-lg md:rounded-xl flex items-center justify-center text-emerald-600"><i data-lucide="phone" class="w-4 h-4"></i></div>
                                    <span class="text-sm md:text-base">${c.telefone || '---'}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button class="flex-1 md:flex-none p-3 md:p-4 bg-white border border-slate-100 rounded-xl md:rounded-2xl text-slate-300 hover:text-emerald-600 shadow-sm transition-all flex items-center justify-center"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                    <button class="flex-1 md:flex-none p-3 md:p-4 bg-white border border-slate-100 rounded-xl md:rounded-2xl text-slate-300 hover:text-red-500 shadow-sm transition-all flex items-center justify-center"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        `).join('')}
                        ${state.clients.length === 0 ? '<p class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs">Sem clientes cadastrados...</p>' : ''}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderNewClient(container) {
            container.innerHTML = `
                <div class="animate-slide-up py-4 md:py-6 space-y-6 md:space-y-10 max-w-4xl mx-auto px-4 md:px-0">
                    <button onclick="navigate('clients')" class="flex items-center gap-3 text-slate-300 font-black uppercase text-[10px] tracking-widest hover:text-emerald-600 transition-colors">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar para Lista
                    </button>
                    
                    <div class="bg-white p-8 md:p-16 card-radius shadow-soft border border-slate-100">
                        <div class="mb-8 md:mb-12 border-l-8 border-emerald-600 pl-6 md:pl-8">
                            <h2 class="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">Novo Cliente</h2>
                            <p class="text-slate-400 font-bold mt-1 uppercase tracking-[0.2em] text-[10px]">Cadastro de Dados Pessoais</p>
                        </div>
                        
                        <form onsubmit="saveClient(event)" class="space-y-6 md:space-y-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                                <div class="space-y-2">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Nome Completo</label>
                                    <input name="nome" type="text" placeholder="Nome do cliente" required>
                                </div>
                                <div class="space-y-2">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">CPF</label>
                                    <input name="cpf" type="text" placeholder="000.000.000-00" required>
                                </div>
                                <div class="space-y-2">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Telefone / WhatsApp</label>
                                    <input name="telefone" type="text" placeholder="(11) 99999-9999">
                                </div>
                                <div class="space-y-2">
                                    <label class="px-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Endereço</label>
                                    <input name="endereco" type="text" placeholder="Rua, Número, Bairro">
                                </div>
                            </div>
                            
                            <div class="pt-6 md:pt-10">
                                <button type="submit" class="w-full emerald-primary text-white py-4 md:py-6 rounded-2xl md:rounded-3xl font-black text-lg md:text-xl shadow-2xl shadow-emerald-100 flex items-center justify-center gap-4 hover:brightness-110 active:scale-95 transition-all">
                                    ${state.loading ? '<div class="loader"></div>' : '<i data-lucide="check-circle" class="w-6 h-6"></i> CADASTRAR CLIENTE'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderSettings(container) {
            container.innerHTML = `
                <div class="animate-slide-up py-4 md:py-6 space-y-10 px-4 md:px-0 max-w-5xl mx-auto">
                    <div>
                        <h2 class="text-3xl md:text-5xl font-black text-slate-800 tracking-tight">Ajustes</h2>
                        <p class="text-slate-400 font-bold mt-2 uppercase tracking-widest text-[10px]">Gestão de Usuários e Segurança</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- User Registration -->
                        <div class="lg:col-span-1">
                            <div class="bg-white p-8 card-radius shadow-soft border border-slate-100 h-full">
                                <h3 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
                                    <i data-lucide="user-plus" class="text-emerald-600"></i> Novo Usuário
                                </h3>
                                <form onsubmit="registerUser(event)" class="space-y-4">
                                    <div class="space-y-1">
                                        <label class="px-4 text-[9px] font-black text-slate-300 uppercase tracking-widest">E-mail</label>
                                        <input name="email" type="email" placeholder="email@exemplo.com" required>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="px-4 text-[9px] font-black text-slate-300 uppercase tracking-widest">Senha Provisória</label>
                                        <input name="password" type="password" placeholder="••••••••" required>
                                    </div>
                                    <button type="submit" class="w-full emerald-primary text-white py-4 rounded-2xl font-black shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2">
                                        ${state.loading ? '<div class="loader"></div>' : '<i data-lucide="plus" class="w-4 h-4"></i> Cadastrar'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- User List -->
                        <div class="lg:col-span-2">
                            <div class="bg-white p-8 card-radius shadow-soft border border-slate-100">
                                <h3 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                                    <i data-lucide="shield-check" class="text-emerald-600"></i> Usuários Ativos
                                </h3>
                                
                                <div class="space-y-4">
                                    ${state.users.map(user => `
                                        <div class="flex items-center justify-between p-4 bg-slate-50 hover:bg-emerald-50/30 rounded-2xl border border-transparent hover:border-emerald-100 transition-all group">
                                            <div class="flex items-center gap-4">
                                                <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-emerald-600 border border-slate-100">
                                                    <i data-lucide="user" class="w-5 h-5"></i>
                                                </div>
                                                <div>
                                                    <p class="font-bold text-slate-700">${user.email}</p>
                                                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">UID: ${user.id.substring(0, 8)}...</p>
                                                </div>
                                            </div>
                                            <div class="flex items-center gap-2">
                                                <button title="Alterar Senha" onclick="updatePassword('${user.id}')" class="p-3 bg-white text-slate-300 hover:text-emerald-600 rounded-xl shadow-sm border border-slate-100 transition-all">
                                                    <i data-lucide="key-round" class="w-4 h-4"></i>
                                                </button>
                                                <button title="Remover" onclick="removeUser('${user.id}')" class="p-3 bg-white text-slate-300 hover:text-red-500 rounded-xl shadow-sm border border-slate-100 transition-all">
                                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                    `).join('')}
                                    ${state.users.length === 0 ? `
                                        <div class="text-center py-10">
                                            <p class="text-slate-300 font-bold uppercase tracking-widest text-[10px]">Aguardando conexão administrativa...</p>
                                            <p class="text-[9px] text-slate-400 mt-2 px-10">Nota: A listagem de usuários requer permissões RPC no Supabase.</p>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        const navigate = (s) => {
            state.currentScreen = s;
            if (state.isSidebarOpen) toggleSidebar();
            render();
        };

        init();
    </script>
</body>

</html>
